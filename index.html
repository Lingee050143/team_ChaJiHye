<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoopMichelin Guide Lite (똥슐랭 가이드 Lite)</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <header class="header">
    <a href="#" class="header-title">
      <span>💩</span> 똥슐랭 가이드 Lite
    </a>
    <button class="scrap-btn">
      📌 내 스크랩 모아보기
    </button>
  </header>

  <section class="search-section">
    <div class="search-container">
      <input type="text" class="search-input" placeholder="식당명 또는 지역명으로 검색해보세요" id="search-input">
      <button class="search-btn" id="search-btn">검색</button>
    </div>
  </section>

  <!-- Mobile Filter Header (Visible on Mobile only) -->
  <div class="search-section mobile-filter-header-wrap" style="padding-top: 0; padding-bottom: 0;">
    <div class="mobile-filter-header" id="mobile-filter-toggle">
        <h2 style="font-size: 1.25rem;">최신 식당 목록</h2>
        <button class="mobile-filter-btn">
            🔍 필터 설정하기
        </button>
    </div>
  </div>

  <main class="main-content">
    
    <!-- Filter Panel (Desktop View) -->
    <aside class="filter-panel">
      <h2 class="filter-title">필터 보기</h2>
      
      <div class="filter-group">
        <h3 class="filter-group-title">장 편안함 지수</h3>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox" name="digestion" value="저포드맵"> 저포드맵</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="글루텐프리"> 글루텐프리</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="락토프리"> 락토프리</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="저지방"> 저지방</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="저자극"> 저자극</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="비발효"> 비발효</label>
          <label class="filter-option"><input type="checkbox" name="digestion" value="무첨가물"> 무첨가물</label>
        </div>
      </div>

      <div class="filter-group">
        <h3 class="filter-group-title">똥슐랭 지수</h3>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox" name="toilet" value="내부 화장실"> 내부 화장실</label>
          <label class="filter-option"><input type="checkbox" name="toilet" value="남녀 분리"> 남녀 분리</label>
          <label class="filter-option"><input type="checkbox" name="toilet" value="청결도 우수"> 청결도 우수</label>
          <label class="filter-option"><input type="checkbox" name="toilet" value="1인 단독"> 1인 단독</label>
          <label class="filter-option"><input type="checkbox" name="toilet" value="넉넉한 칸"> 넉넉한 칸</label>
        </div>
      </div>

      <button class="apply-filter-btn" id="apply-filter-desktop">필터 적용하기</button>
    </aside>

    <!-- Restaurant Grid -->
    <div class="grid-container" id="restaurant-grid">
      <!-- Generated by JS -->
    </div>

  </main>

  <!-- Mobile Filter Drawer (Drawer for mobile) -->
  <div class="filter-backdrop" id="filter-backdrop"></div>
  <div class="mobile-filter-overlay" id="mobile-filter-overlay">
    <div style="display:flex; justify-content:space-between; margin-bottom: 24px; align-items:center;">
        <h2 class="filter-title" style="margin-bottom:0;">필터 설정</h2>
        <button id="close-mobile-filter" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>

    <!-- Same group but for mobile -->
    <div class="filter-group">
      <h3 class="filter-group-title">장 편안함 지수</h3>
      <div class="filter-options" id="mobile-digestion-options">
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="저포드맵"> 저포드맵</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="글루텐프리"> 글루텐프리</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="락토프리"> 락토프리</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="저지방"> 저지방</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="저자극"> 저자극</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="비발효"> 비발효</label>
        <label class="filter-option"><input type="checkbox" name="m-digestion" value="무첨가물"> 무첨가물</label>
      </div>
    </div>

    <div class="filter-group">
      <h3 class="filter-group-title">똥슐랭 지수</h3>
      <div class="filter-options" id="mobile-toilet-options">
        <label class="filter-option"><input type="checkbox" name="m-toilet" value="내부 화장실"> 내부 화장실</label>
        <label class="filter-option"><input type="checkbox" name="m-toilet" value="남녀 분리"> 남녀 분리</label>
        <label class="filter-option"><input type="checkbox" name="m-toilet" value="청결도 우수"> 청결도 우수</label>
        <label class="filter-option"><input type="checkbox" name="m-toilet" value="1인 단독"> 1인 단독</label>
        <label class="filter-option"><input type="checkbox" name="m-toilet" value="넉넉한 칸"> 넉넉한 칸</label>
      </div>
    </div>

    <button class="apply-filter-btn" id="apply-filter-mobile">필터 적용하기</button>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      
      <div class="modal-header">
        <h2 class="modal-name" id="modal-name"></h2>
        <div class="modal-meta">
          <span id="modal-loc">📍</span>
          <span id="modal-price">💰</span>
        </div>
        <div class="card-badges" id="modal-badges"></div>
      </div>

      <div class="modal-section">
        <h3 class="section-title">🥗 추천 메뉴</h3>
        <ul class="menu-list" id="modal-menu"></ul>
      </div>

      <div class="modal-section">
        <h3 class="section-title">✍️ 에디터 한마디</h3>
        <p class="editor-comment" id="modal-comment"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
